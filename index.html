<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net;">
    <title>نظام إدارة البلايستيشن</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .room-card {
            transition: 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .status-available {
            background-color: #d1e7dd;
            border-color: #badbcc;
            color: #0f5132;
        }
        
        .status-busy {
            background-color: #f8d7da;
            border-color: #f5c2c7;
            color: #842029;
        }
        
        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>

<body class="p-4">

    <script>
        if (typeof module === 'object') {
            window.tempModule = module;
            module = undefined;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (window.tempModule) {
            module = window.tempModule;
        }
    </script>

    <div class="container">
        <h2 class="text-center mb-4 text-dark">شاشة المراقبة الرئيسية</h2>
        <div id="rooms-container" class="row g-4"></div>
    </div>
    <div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="roomModalLabel">إدارة الغرفة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="roomModalBody">

                    <h6 class="text-primary mb-3">إضافة مشروب سريع:</h6>
                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-sm btn-outline-success" onclick="addCharge('شاي', 10)">شاي (10 ج)</button>
                        <button class="btn btn-sm btn-outline-success" onclick="addCharge('قهوة', 15)">قهوة (15 ج)</button>
                        <button class="btn btn-sm btn-outline-success" onclick="addCharge('كانز', 20)">كانز (20 ج)</button>
                    </div>

                    <hr>

                    <h6 class="text-danger mb-3">إضافة غرامة / طلب آخر:</h6>
                    <div class="input-group mb-4">
                        <input type="text" id="customDesc" class="form-control" placeholder="الوصف (مثال: كسر ذراع)">
                        <input type="number" id="customPrice" class="form-control" placeholder="السعر" style="max-width: 100px;">
                        <button class="btn btn-danger" onclick="addCustomCharge()">إضافة</button>
                    </div>

                    <hr>

                    <h6 class="text-dark mb-3">طلبات الجلسة الحالية:</h6>
                    <ul class="list-group" id="chargesList">
                    </ul>

                </div>
            </div>
        </div>
    </div>

    <script>
        const {
            ipcRenderer
        } = require('electron');
        let activeRooms = {}; // هنا هنحفظ وقت بداية كل غرفة شغالة

        // 1. دالة لتنسيق الثواني لشكل (ساعات:دقائق:ثواني)
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // 2. تحديث الشاشة كل ثانية
        setInterval(() => {
            const now = new Date();
            for (let i = 1; i <= 6; i++) {
                const roomCard = document.getElementById(`room-${i}`);
                if (!roomCard) continue;
                const timerDiv = roomCard.querySelector('.timer');

                if (activeRooms[i]) {
                    const startTime = new Date(activeRooms[i].replace(' ', 'T'));
                    const diffInSeconds = Math.floor((now - startTime) / 1000);
                    timerDiv.innerText = formatTime(diffInSeconds);
                } else {
                    timerDiv.innerText = "00:00:00";
                }
            }
        }, 1000);

        // 3. دالة رسم الغرف وتحديث حالتها
        function renderRooms() {
            const container = document.getElementById('rooms-container');
            container.innerHTML = '';

            for (let i = 1; i <= 6; i++) {
                const isBusy = activeRooms[i] !== undefined;
                const statusClass = isBusy ? 'status-busy' : 'status-available';
                const statusText = isBusy ? 'مشغول' : 'متاح';

                container.innerHTML += `
                <div class="col-md-4">
                    <div class="card room-card ${statusClass} text-center p-4" id="room-${i}" onclick="openRoomDetails(${i})">
                        <h3 class="card-title">غرفة ${i}</h3>
                        <p class="card-text mb-1 fw-bold">${statusText}</p>
                        <div class="timer">00:00:00</div>
                    </div>
                </div>
            `;
            }
        }

        // دالة فتح نافذة الطلبات للغرفة المحددة
        let currentSelectedRoom = null;

        function openRoomDetails(roomId) {
            currentSelectedRoom = roomId;

            // تغيير عنوان النافذة برقم الغرفة
            document.getElementById('roomModalLabel').innerText = `إدارة طلبات - غرفة ${roomId}`;

            // إظهار النافذة (الآن تضمن أن الكائن bootstrap مُعرف بالكامل)
            const modal = new bootstrap.Modal(document.getElementById('roomModal'));
            modal.show();
        }

        // 4. استرجاع الجلسات النشطة عند فتح البرنامج
        ipcRenderer.invoke('get-active-sessions').then((sessions) => {
            sessions.forEach(session => {
                activeRooms[session.room_id] = session.start_time;
            });
            renderRooms();
        });

        // 5. نظام التقاط الباركود
        let barcodeBuffer = '';
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const roomId = parseInt(barcodeBuffer);
                if (roomId >= 1 && roomId <= 6) {
                    ipcRenderer.invoke('toggle-room', roomId).then((res) => {
                        if (res.status === 'started') {
                            activeRooms[roomId] = res.startTime;
                        } else {
                            delete activeRooms[roomId];
                        }
                        renderRooms();
                    }).catch(err => alert("حدث خطأ: " + err));
                }
                barcodeBuffer = '';
            } else {
                barcodeBuffer += e.key;
            }
        });
        // دالة لإرسال الطلب للـ Backend
        function addCharge(description, price) {
            if (!currentSelectedRoom) return;

            ipcRenderer.invoke('add-charge', {
                roomId: currentSelectedRoom,
                description,
                price
            }).then((res) => {
                if (res.success) {
                    loadRoomCharges(); // تحديث الجدول فوراً بعد الإضافة
                } else {
                    alert(res.message);
                }
            });
        }

        // دالة مخصصة للغرامات تقرأ من الـ Inputs
        function addCustomCharge() {
            const desc = document.getElementById('customDesc').value;
            const price = parseFloat(document.getElementById('customPrice').value);

            if (desc && price) {
                addCharge(desc, price);
                // تصفير الخانات بعد الإضافة
                document.getElementById('customDesc').value = '';
                document.getElementById('customPrice').value = '';
            } else {
                alert('يرجى إدخال الوصف والسعر بشكل صحيح');
            }
        }

        // دالة لجلب الطلبات الحالية وعرضها في الـ Modal
        function loadRoomCharges() {
            const list = document.getElementById('chargesList');
            list.innerHTML = ''; // تفريغ القائمة القديمة

            ipcRenderer.invoke('get-room-charges', currentSelectedRoom).then((charges) => {
                if (charges.length === 0) {
                    list.innerHTML = '<li class="list-group-item text-muted text-center">لا توجد طلبات حتى الآن</li>';
                    return;
                }

                let total = 0;
                charges.forEach(charge => {
                    total += charge.price;
                    list.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            ${charge.description}
                            <span class="badge bg-primary rounded-pill">${charge.price} ج.م</span>
                        </li>
                    `;
                });

                // إضافة سطر الإجمالي في النهاية
                list.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center fw-bold bg-light mt-2">
                        إجمالي الطلبات
                        <span class="text-danger">${total} ج.م</span>
                    </li>
                `;
            });
        }

        function openRoomDetails(roomId) {
            currentSelectedRoom = roomId;
            document.getElementById('roomModalLabel').innerText = `إدارة طلبات - غرفة ${roomId}`;

            // جلب الطلبات قبل فتح النافذة
            loadRoomCharges();

            const modal = new bootstrap.Modal(document.getElementById('roomModal'));
            modal.show();
        }
    </script>
</body>

</html>
